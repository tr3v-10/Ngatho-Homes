<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropCore — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080c10;
  --bg2:    #0d1218;
  --bg3:    #111820;
  --bg4:    #161f2c;
  --blue:   #1a8fff;
  --blue2:  #0d6fd4;
  --blue-g: #1a8fff22;
  --orange: #ff6b2b;
  --org-g:  #ff6b2b22;
  --teal:   #00d4c8;
  --purple: #a855f7;
  --green:  #22c55e;
  --red:    #ef4444;
  --yellow: #eab308;
  --text:   #f0f4f8;
  --muted:  #8899aa;
  --border: #1e2a38;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.3s;
}
.sidebar-logo {
  padding: 1.5rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.sidebar-nav { padding: 1rem 0; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.75rem 1.2rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 500;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--blue); border-left-color: var(--blue); }
.nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }
.sidebar-footer {
  padding: 1rem 1.2rem;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--muted);
}
.admin-badge {
  display: flex; align-items: center; gap: 0.6rem;
}
.admin-avatar {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--orange), var(--purple));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.8rem; color: #fff;
}

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; }
.topbar-right { display:flex; gap:0.7rem; align-items:center; }

/* BUTTONS */
.btn {
  padding: 0.55rem 1.2rem;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  display: inline-flex; align-items: center; gap: 0.4rem;
}
.btn:hover { transform: translateY(-2px); opacity: 0.92; }
.btn:active { transform: scale(0.97); }
.btn-blue   { background: var(--blue);   color: #fff; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-green  { background: var(--green);  color: #fff; }
.btn-red    { background: var(--red);    color: #fff; }
.btn-ghost  { background: var(--bg3);    color: var(--text); border: 1px solid var(--border); }

/* CONTENT */
.content { flex:1; overflow-y:auto; padding:1.5rem; }

/* STAT CARDS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.3rem 1.2rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { transform: translateY(-3px); border-color: var(--blue); }
.stat-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent, var(--blue)), transparent);
}
.stat-card .num {
  font-family:'Syne',sans-serif;
  font-size:2rem; font-weight:800;
  color: var(--accent, var(--blue));
}
.stat-card .label { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; text-transform:uppercase; letter-spacing:0.06em; }
.stat-card .icon { position:absolute; right:1rem; top:1rem; font-size:1.5rem; opacity:0.4; }

/* TAB SECTIONS */
.section { display:none; }
.section.active { display:block; }

/* TABLES */
.table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-top: 1rem;
}
.table-header {
  padding: 1rem 1.2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 0.5rem;
}
.table-header h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
table { width:100%; border-collapse:collapse; }
th {
  padding: 0.7rem 1rem;
  text-align: left;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 0.85rem 1rem;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }

/* BADGES */
.badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.badge-open     { background:#ef444422; color:var(--red); }
.badge-assigned { background:#eab30822; color:var(--yellow); }
.badge-inprogress { background:#1a8fff22; color:var(--blue); }
.badge-resolved { background:#22c55e22; color:var(--green); }
.badge-critical { background:#ef444433; color:var(--red); border:1px solid var(--red); }
.badge-high     { background:#ff6b2b22; color:var(--orange); }
.badge-medium   { background:#eab30822; color:var(--yellow); }
.badge-low      { background:#8899aa22; color:var(--muted); }
.badge-available{ background:#22c55e22; color:var(--green); }
.badge-busy     { background:#ff6b2b22; color:var(--orange); }
.badge-offline  { background:#8899aa22; color:var(--muted); }
.badge-occupied { background:#1a8fff22; color:var(--blue); }
.badge-vacant   { background:#22c55e22; color:var(--green); }
.badge-maintenance { background:#ef444422; color:var(--red); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset:0;
  background: rgba(0,0,0,0.75);
  z-index: 999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display:flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity:0; transform:scale(0.93) translateY(12px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.modal h2 { font-family:'Syne',sans-serif; font-weight:800; margin-bottom:1.2rem; font-size:1.2rem; }
.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--muted); margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.06em; }
.form-group input,
.form-group select,
.form-group textarea {
  width:100%; padding:0.7rem 0.9rem;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.9rem;
  transition:border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { outline:none; border-color:var(--blue); }
.form-group select option { background:var(--bg3); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
.modal-actions { display:flex; gap:0.7rem; margin-top:1.2rem; justify-content:flex-end; }

/* TOAST */
.toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:0.5rem; }
.toast {
  background: var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:0.8rem 1.2rem;
  font-size:0.88rem; font-weight:500;
  display:flex; align-items:center; gap:0.6rem;
  animation: toastIn 0.3s ease;
  min-width: 260px;
}
@keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
.toast.success { border-color:var(--green); }
.toast.error   { border-color:var(--red); }

/* SEARCH */
.search-input {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:0.5rem 0.9rem;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem;
  width:220px; transition:border-color 0.2s;
}
.search-input:focus { outline:none; border-color:var(--blue); }

/* LOADING */
.loading { text-align:center; padding:3rem; color:var(--muted); font-size:0.95rem; }
.spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--blue); border-radius:50%;
  animation:spin 0.8s linear infinite; margin:0 auto 0.8rem;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* EMPTY STATE */
.empty { text-align:center; padding:3rem; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:0.8rem; }

/* FILTER TABS */
.filter-tabs { display:flex; gap:0.4rem; flex-wrap:wrap; }
.filter-tab {
  padding:0.3rem 0.9rem; border-radius:8px; font-size:0.8rem;
  font-weight:600; cursor:pointer; border:1px solid var(--border);
  background:var(--bg3); color:var(--muted); transition:0.2s;
}
.filter-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }

@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar-logo span, .nav-item span, .sidebar-footer { display:none; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">⚡</div>
    <span>PropCore</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="showSection('dashboard')">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="showSection('properties')">
      <span class="nav-icon">🏢</span><span>Properties</span>
    </div>
    <div class="nav-item" onclick="showSection('units')">
      <span class="nav-icon">🚪</span><span>Units</span>
    </div>
    <div class="nav-item" onclick="showSection('tenants')">
      <span class="nav-icon">👥</span><span>Tenants</span>
    </div>
    <div class="nav-item" onclick="showSection('workers')">
      <span class="nav-icon">🔧</span><span>Workers</span>
    </div>
    <div class="nav-item" onclick="showSection('requests')">
      <span class="nav-icon">📋</span><span>Maintenance</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-badge">
      <div class="admin-avatar">A</div>
      <span>Admin</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">Dashboard</div>
    <div class="topbar-right">
      <span style="color:var(--muted);font-size:0.85rem" id="currentTime"></span>
    </div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div class="section active" id="sec-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="loading"><div class="spinner"></div>Loading...</div>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <h3>Recent Maintenance Requests</h3>
          <button class="btn btn-orange" onclick="showSection('requests')">View All →</button>
        </div>
        <div id="recentRequests"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- PROPERTIES -->
    <div class="section" id="sec-properties">
      <div class="table-wrap">
        <div class="table-header">
          <h3>🏢 Properties</h3>
          <button class="btn btn-blue" onclick="openModal('property')">+ Add Property</button>
        </div>
        <div id="propertiesTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- UNITS -->
    <div class="section" id="sec-units">
      <div class="table-wrap">
        <div class="table-header">
          <h3>🚪 Units</h3>
          <button class="btn btn-blue" onclick="openModal('unit')">+ Add Unit</button>
        </div>
        <div id="unitsTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- TENANTS -->
    <div class="section" id="sec-tenants">
      <div class="table-wrap">
        <div class="table-header">
          <h3>👥 Tenants</h3>
          <div style="display:flex;gap:0.5rem">
            <input class="search-input" id="tenantSearch" placeholder="Search tenant..." oninput="filterTable('tenantSearch','tenantRows')">
            <button class="btn btn-blue" onclick="openModal('tenant')">+ Add Tenant</button>
          </div>
        </div>
        <div id="tenantsTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- WORKERS -->
    <div class="section" id="sec-workers">
      <div class="table-wrap">
        <div class="table-header">
          <h3>🔧 Workers</h3>
          <button class="btn btn-blue" onclick="openModal('worker')">+ Add Worker</button>
        </div>
        <div id="workersTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- REQUESTS -->
    <div class="section" id="sec-requests">
      <div class="table-wrap">
        <div class="table-header">
          <h3>📋 Maintenance Requests</h3>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <div class="filter-tabs">
              <div class="filter-tab active" onclick="filterRequests('')">All</div>
              <div class="filter-tab" onclick="filterRequests('open')">Open</div>
              <div class="filter-tab" onclick="filterRequests('assigned')">Assigned</div>
              <div class="filter-tab" onclick="filterRequests('in_progress')">In Progress</div>
              <div class="filter-tab" onclick="filterRequests('resolved')">Resolved</div>
            </div>
            <button class="btn btn-orange" onclick="openModal('request')">+ New Request</button>
          </div>
        </div>
        <div id="requestsTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const API = 'php/api.php';

// ── TIME ──
function updateTime() {
  document.getElementById('currentTime').textContent =
    new Date().toLocaleString('en-KE', { weekday:'short', year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
setInterval(updateTime, 1000); updateTime();

// ── TOAST ──
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── NAV ──
let currentSection = 'dashboard';
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.textContent.toLowerCase().includes(name === 'requests' ? 'maint' : name)) n.classList.add('active');
  });
  const titles = { dashboard:'Dashboard', properties:'Properties', units:'Units', tenants:'Tenants', workers:'Workers', requests:'Maintenance Requests' };
  document.getElementById('pageTitle').textContent = titles[name] || name;
  currentSection = name;
  loadSection(name);
}

function loadSection(name) {
  if (name === 'dashboard')   { loadStats(); loadRecentRequests(); }
  if (name === 'properties')  loadProperties();
  if (name === 'units')       loadUnits();
  if (name === 'tenants')     loadTenants();
  if (name === 'workers')     loadWorkers();
  if (name === 'requests')    loadRequests();
}

// ── API HELPER ──
async function api(action, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  let url = `${API}?action=${action}`;
  const r = await fetch(url, opts);
  return r.json();
}
async function apiDelete(action, id) {
  const r = await fetch(`${API}?action=${action}&id=${id}`, { method:'DELETE' });
  return r.json();
}

// ── STATS ──
async function loadStats() {
  const s = await api('stats');
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card" style="--accent:var(--blue)">
      <div class="icon">🏢</div>
      <div class="num">${s.properties}</div>
      <div class="label">Properties</div>
    </div>
    <div class="stat-card" style="--accent:var(--teal)">
      <div class="icon">🚪</div>
      <div class="num">${s.units}</div>
      <div class="label">Total Units</div>
    </div>
    <div class="stat-card" style="--accent:var(--purple)">
      <div class="icon">👥</div>
      <div class="num">${s.tenants}</div>
      <div class="label">Active Tenants</div>
    </div>
    <div class="stat-card" style="--accent:var(--orange)">
      <div class="icon">🔧</div>
      <div class="num">${s.workers}</div>
      <div class="label">Workers</div>
    </div>
    <div class="stat-card" style="--accent:var(--red)">
      <div class="icon">📋</div>
      <div class="num">${s.open_requests}</div>
      <div class="label">Open Requests</div>
    </div>
    <div class="stat-card" style="--accent:var(--green)">
      <div class="icon">✅</div>
      <div class="num">${s.resolved_requests}</div>
      <div class="label">Resolved</div>
    </div>
    <div class="stat-card" style="--accent:var(--red)">
      <div class="icon">🚨</div>
      <div class="num">${s.critical}</div>
      <div class="label">Critical Issues</div>
    </div>
    <div class="stat-card" style="--accent:var(--green)">
      <div class="icon">🏠</div>
      <div class="num">${s.vacant_units}</div>
      <div class="label">Vacant Units</div>
    </div>
  `;
}

// ── RECENT REQUESTS ──
async function loadRecentRequests() {
  const data = await api('get_requests');
  const recent = data.slice(0, 6);
  document.getElementById('recentRequests').innerHTML = renderRequestsTable(recent);
}

// ── PROPERTIES ──
async function loadProperties() {
  const data = await api('get_properties');
  if (!data.length) { document.getElementById('propertiesTable').innerHTML = emptyState('No properties yet'); return; }
  document.getElementById('propertiesTable').innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>City</th><th>Units</th><th>Occupied</th><th>Vacant</th><th>Open Issues</th><th>Actions</th></tr></thead>
      <tbody>${data.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.city}</td>
          <td>${p.total_units}</td>
          <td><span class="badge badge-occupied">${p.occupied}</span></td>
          <td><span class="badge badge-vacant">${p.vacant}</span></td>
          <td>${p.open_requests > 0 ? `<span class="badge badge-open">${p.open_requests}</span>` : '—'}</td>
          <td><button class="btn btn-red" onclick="deleteItem('delete_property',${p.id},'loadProperties')">🗑</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── UNITS ──
async function loadUnits() {
  const data = await api('get_units');
  if (!data.length) { document.getElementById('unitsTable').innerHTML = emptyState('No units yet'); return; }
  document.getElementById('unitsTable').innerHTML = `
    <table>
      <thead><tr><th>Unit</th><th>Property</th><th>Floor</th><th>Beds</th><th>Rent (KSh)</th><th>Status</th></tr></thead>
      <tbody>${data.map(u => `
        <tr>
          <td><strong>${u.unit_number}</strong></td>
          <td>${u.property_name}</td>
          <td>${u.floor}</td>
          <td>${u.bedrooms} BR</td>
          <td>${Number(u.rent_amount).toLocaleString()}</td>
          <td><span class="badge badge-${u.status}">${u.status}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── TENANTS ──
async function loadTenants() {
  const data = await api('get_tenants');
  if (!data.length) { document.getElementById('tenantsTable').innerHTML = emptyState('No tenants yet'); return; }
  document.getElementById('tenantsTable').innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Unit</th><th>Property</th><th>Lease End</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="tenantRows">${data.map(t => `
        <tr>
          <td><strong>${t.first_name} ${t.last_name}</strong></td>
          <td>${t.email}</td>
          <td>${t.phone || '—'}</td>
          <td>${t.unit_number || '—'}</td>
          <td>${t.property_name || '—'}</td>
          <td>${t.lease_end ? t.lease_end.substring(0,10) : '—'}</td>
          <td><span class="badge badge-${t.status === 'active' ? 'available' : 'offline'}">${t.status}</span></td>
          <td><button class="btn btn-red" onclick="deleteItem('delete_tenant',${t.id},'loadTenants')">🗑</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── WORKERS ──
async function loadWorkers() {
  const data = await api('get_workers');
  if (!data.length) { document.getElementById('workersTable').innerHTML = emptyState('No workers yet'); return; }
  document.getElementById('workersTable').innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Skill</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${data.map(w => `
        <tr>
          <td><strong>${w.first_name} ${w.last_name}</strong></td>
          <td>${w.email}</td>
          <td>${w.phone || '—'}</td>
          <td><span class="badge badge-inprogress">${w.skill}</span></td>
          <td>
            <select class="badge badge-${w.status}" onchange="updateWorkerStatus(${w.id},this.value)" style="border:none;background:transparent;color:inherit;cursor:pointer;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em">
              <option value="available" ${w.status==='available'?'selected':''}>Available</option>
              <option value="busy"      ${w.status==='busy'?'selected':''}>Busy</option>
              <option value="offline"   ${w.status==='offline'?'selected':''}>Offline</option>
            </select>
          </td>
          <td><button class="btn btn-red" onclick="deleteItem('delete_worker',${w.id},'loadWorkers')">🗑</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function updateWorkerStatus(id, status) {
  await fetch(`${API}?action=update_worker_status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id,status}) });
  toast('Worker status updated');
}

// ── REQUESTS ──
let currentRequestFilter = '';
function filterRequests(status) {
  currentRequestFilter = status;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadRequests();
}

async function loadRequests() {
  const url = currentRequestFilter ? `${API}?action=get_requests&status=${currentRequestFilter}` : `${API}?action=get_requests`;
  const data = await (await fetch(url)).json();
  document.getElementById('requestsTable').innerHTML = data.length ? renderRequestsTable(data) : emptyState('No requests found');
}

function renderRequestsTable(data) {
  return `
    <table>
      <thead><tr><th>Title</th><th>Property</th><th>Unit</th><th>Tenant</th><th>Category</th><th>Priority</th><th>Status</th><th>Worker</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${data.map(r => `
        <tr>
          <td><strong>${r.title}</strong></td>
          <td>${r.property_name}</td>
          <td>${r.unit_number}</td>
          <td>${r.tenant_name}</td>
          <td><span class="badge badge-inprogress">${r.category}</span></td>
          <td><span class="badge badge-${r.priority}">${r.priority}</span></td>
          <td><span class="badge badge-${r.status.replace('_','')}">${r.status.replace('_',' ')}</span></td>
          <td>${r.worker_name || '<button class="btn btn-ghost" style="font-size:0.78rem;padding:0.3rem 0.7rem" onclick="openAssignModal('+r.id+')">Assign</button>'}</td>
          <td style="font-size:0.8rem;color:var(--muted)">${r.submitted_at ? r.submitted_at.substring(0,10) : '—'}</td>
          <td style="display:flex;gap:0.3rem">
            ${r.status !== 'resolved' ? `<button class="btn btn-green" style="font-size:0.75rem;padding:0.3rem 0.6rem" onclick="resolveRequest(${r.id})">✓</button>` : ''}
            <button class="btn btn-red" style="font-size:0.75rem;padding:0.3rem 0.6rem" onclick="deleteItem('delete_request',${r.id},'loadRequests')">🗑</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function resolveRequest(id) {
  await fetch(`${API}?action=update_request_status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, status:'resolved'}) });
  toast('Request marked as resolved ✅'); loadRequests(); loadStats();
}

async function openAssignModal(reqId) {
  const workers = await api('get_workers');
  const available = workers.filter(w => w.status === 'available');
  document.getElementById('modalBox').innerHTML = `
    <h2>Assign Worker</h2>
    <div class="form-group">
      <label>Select Available Worker</label>
      <select id="assignWorker">
        <option value="">— Select Worker —</option>
        ${available.map(w => `<option value="${w.id}">${w.first_name} ${w.last_name} (${w.skill})</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-blue" onclick="submitAssign(${reqId})">Assign →</button>
    </div>`;
  openModal();
}

async function submitAssign(reqId) {
  const wid = document.getElementById('assignWorker').value;
  if (!wid) { toast('Select a worker', 'error'); return; }
  await fetch(`${API}?action=assign_request`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({request_id:reqId, worker_id:wid}) });
  toast('Worker assigned!'); closeModal(); loadRequests();
}

// ── MODALS ──
function openModal(type) {
  const box = document.getElementById('modalBox');
  if (type === 'property') {
    box.innerHTML = `
      <h2>🏢 Add Property</h2>
      <div class="form-group"><label>Property Name</label><input id="f_name" placeholder="e.g. Sunrise Apartments"></div>
      <div class="form-group"><label>Address</label><input id="f_addr" placeholder="e.g. 12 Njoro Road"></div>
      <div class="form-group"><label>City</label><input id="f_city" placeholder="e.g. Nakuru"></div>
      <div class="form-group"><label>Total Units</label><input id="f_units" type="number" placeholder="20"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-blue" onclick="submitProperty()">Save Property</button>
      </div>`;
  } else if (type === 'unit') {
    loadPropertiesForSelect().then(opts => {
      box.innerHTML = `
        <h2>🚪 Add Unit</h2>
        <div class="form-group"><label>Property</label><select id="f_pid">${opts}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Unit Number</label><input id="f_unum" placeholder="A101"></div>
          <div class="form-group"><label>Floor</label><input id="f_floor" type="number" value="1"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Bedrooms</label><input id="f_beds" type="number" value="1"></div>
          <div class="form-group"><label>Rent (KSh)</label><input id="f_rent" type="number" placeholder="18000"></div>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="f_status"><option value="vacant">Vacant</option><option value="occupied">Occupied</option></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-blue" onclick="submitUnit()">Save Unit</button>
        </div>`;
    });
  } else if (type === 'tenant') {
    loadUnitsForSelect().then(opts => {
      box.innerHTML = `
        <h2>👤 Add Tenant</h2>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input id="f_fn" placeholder="James"></div>
          <div class="form-group"><label>Last Name</label><input id="f_ln" placeholder="Mwangi"></div>
        </div>
        <div class="form-group"><label>Email</label><input id="f_email" type="email" placeholder="james@email.com"></div>
        <div class="form-group"><label>Phone</label><input id="f_phone" placeholder="0712345678"></div>
        <div class="form-group"><label>Password</label><input id="f_pass" type="password" placeholder="Set login password"></div>
        <div class="form-group"><label>Unit</label><select id="f_uid">${opts}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Lease Start</label><input id="f_ls" type="date"></div>
          <div class="form-group"><label>Lease End</label><input id="f_le" type="date"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-blue" onclick="submitTenant()">Save Tenant</button>
        </div>`;
    });
  } else if (type === 'worker') {
    box.innerHTML = `
      <h2>🔧 Add Worker</h2>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input id="f_fn" placeholder="Ali"></div>
        <div class="form-group"><label>Last Name</label><input id="f_ln" placeholder="Hassan"></div>
      </div>
      <div class="form-group"><label>Email</label><input id="f_email" type="email" placeholder="ali@propcore.com"></div>
      <div class="form-group"><label>Phone</label><input id="f_phone" placeholder="0756789012"></div>
      <div class="form-group"><label>Skill</label>
        <select id="f_skill">
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="carpentry">Carpentry</option>
          <option value="cleaning">Cleaning</option>
          <option value="HVAC">HVAC</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-blue" onclick="submitWorker()">Save Worker</button>
      </div>`;
  } else if (type === 'request') {
    Promise.all([loadUnitsForSelect(), loadTenantsForSelect()]).then(([uopts, topts]) => {
      box.innerHTML = `
        <h2>📋 New Maintenance Request</h2>
        <div class="form-group"><label>Title</label><input id="f_title" placeholder="e.g. Leaking kitchen pipe"></div>
        <div class="form-group"><label>Description</label><textarea id="f_desc" rows="3" placeholder="Describe the issue..."></textarea></div>
        <div class="form-group"><label>Unit</label><select id="f_uid">${uopts}</select></div>
        <div class="form-group"><label>Tenant</label><select id="f_tid">${topts}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Category</label>
            <select id="f_cat">
              <option value="plumbing">Plumbing</option>
              <option value="electrical">Electrical</option>
              <option value="carpentry">Carpentry</option>
              <option value="cleaning">Cleaning</option>
              <option value="HVAC">HVAC</option>
              <option value="general">General</option>
            </select>
          </div>
          <div class="form-group"><label>Priority</label>
            <select id="f_pri">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-orange" onclick="submitRequest()">Submit Request</button>
        </div>`;
    });
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ── SUBMIT HANDLERS ──
async function submitProperty() {
  const body = { name: val('f_name'), address: val('f_addr'), city: val('f_city'), total_units: val('f_units') };
  if (!body.name || !body.city) { toast('Fill in all fields', 'error'); return; }
  await api('add_property', 'POST', body);
  toast('Property added!'); closeModal(); loadProperties();
}

async function submitUnit() {
  const body = { property_id: val('f_pid'), unit_number: val('f_unum'), floor: val('f_floor'), bedrooms: val('f_beds'), rent_amount: val('f_rent'), status: val('f_status') };
  if (!body.unit_number || !body.rent_amount) { toast('Fill in all fields', 'error'); return; }
  await api('add_unit', 'POST', body);
  toast('Unit added!'); closeModal(); loadUnits();
}

async function submitTenant() {
  const body = { first_name: val('f_fn'), last_name: val('f_ln'), email: val('f_email'), phone: val('f_phone'), password: val('f_pass'), unit_id: val('f_uid'), lease_start: val('f_ls'), lease_end: val('f_le') };
  if (!body.email || !body.first_name) { toast('Fill in all fields', 'error'); return; }
  const res = await api('add_tenant', 'POST', body);
  if (res.error) { toast(res.error, 'error'); return; }
  toast('Tenant added!'); closeModal(); loadTenants();
}

async function submitWorker() {
  const body = { first_name: val('f_fn'), last_name: val('f_ln'), email: val('f_email'), phone: val('f_phone'), skill: val('f_skill') };
  if (!body.email || !body.first_name) { toast('Fill in all fields', 'error'); return; }
  await api('add_worker', 'POST', body);
  toast('Worker added!'); closeModal(); loadWorkers();
}

async function submitRequest() {
  const body = { title: val('f_title'), description: val('f_desc'), unit_id: val('f_uid'), tenant_id: val('f_tid'), category: val('f_cat'), priority: val('f_pri') };
  if (!body.title) { toast('Enter a title', 'error'); return; }
  await api('add_request', 'POST', body);
  toast('Request submitted!'); closeModal(); loadRequests(); loadStats();
}

// ── DELETE ──
async function deleteItem(action, id, reload) {
  if (!confirm('Are you sure you want to delete this item?')) return;
  await apiDelete(action, id);
  toast('Deleted successfully');
  window[reload]();
  loadStats();
}

// ── HELPERS ──
function val(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function emptyState(msg) { return `<div class="empty"><div class="empty-icon">📭</div>${msg}</div>`; }

async function loadPropertiesForSelect() {
  const data = await api('get_properties');
  return `<option value="">— Select Property —</option>` + data.map(p => `<option value="${p.id}">${p.name} (${p.city})</option>`).join('');
}
async function loadUnitsForSelect() {
  const data = await api('get_units');
  return `<option value="">— Select Unit —</option>` + data.map(u => `<option value="${u.id}">${u.unit_number} — ${u.property_name}</option>`).join('');
}
async function loadTenantsForSelect() {
  const data = await api('get_tenants');
  return `<option value="">— Select Tenant —</option>` + data.map(t => `<option value="${t.id}">${t.first_name} ${t.last_name}</option>`).join('');
}

function filterTable(inputId, tbodyId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  const rows = document.querySelectorAll(`#${tbodyId} tr`);
  rows.forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
}

// ── INIT ──
loadSection('dashboard');
</script>
